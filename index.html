let mode = "simple";

function rand(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function setMode(m) {
  mode = m;
  document.getElementById("modeText").innerText = m.toUpperCase();
}

function generateTheme() {
  let result = "";

  if (mode === "simple") {
    result = `${rand(categories)} ${rand(categories)} ${rand(roles)}`;
  }

  if (mode === "with difficulty") {
    result = `${rand(categories)} ${rand(roles)} ${rand(twists)}`;
  }

  if (mode === "series") {
    const base = rand(categories);
    result =
      `${base} ${rand(roles)}\n` +
      `${base} ${rand(roles)}\n` +
      `${base} Queen/King`;
  }

  if (mode === "nation") {
    result = `${rand(nations)} ${rand(categories)} ${rand(roles)}`;
  }

  if (mode === "nation + nation") {
    result = `${rand(nations)} + ${rand(nations)}`;
  }

  if (mode === "attribute") {
    result = `${rand(attribute)} + ${rand(attribute)}`;
  }

 if (mode === "nation + tag") {
    result = `${rand(nations)} + ${rand(tags)}`;
  }

 if (mode === "tag + attribute") {
    result = `${rand(tags)} + ${rand(attribute)}`;
  }

  if (mode === "special") {
    result = rand(specialThemes);
  }
  
  if (mode === "love nikki competition") {
    result = rand(lovenikkicompetitionThemes)
  }
  document.getElementById("theme").innerText = result;
}
